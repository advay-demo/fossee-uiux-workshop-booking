{% extends "workshop_app/base.html" %}

{% block title %} Forgot Password {% endblock %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">

        <div class="login-card text-center">

            <h2>
                <span style="font-weight:700;">Forgot</span>
                <span class="highlight-text">Password?</span>
            </h2>

            <p style="color:#64748b; margin-bottom:20px;">
                Enter your registered email address to reset your password
            </p>

            <form method="post">
                {% csrf_token %}

                <!-- Email input -->
                <input type="email" name="email" placeholder="Email address" style="
                    width:100%;
                    padding:12px 14px;
                    border-radius:12px;
                    border:1px solid #e2e8f0;
                    background:#f8fafc;
                    margin-bottom:15px;
                ">

                <br>

                <!-- Purple button -->
                <button type="submit" style="
                width:100%;
                padding:12px;
                border-radius:14px;
                border:none;
                background: linear-gradient(135deg, #6366f1, #8b5cf6);
                color:white;
                font-weight:600;
                margin-bottom:8px;
                cursor:pointer;
                ">
                    Request
                </button>

                <!-- Back link -->
                <a href="/workshop/login/" style="
                display:inline-block;
                font-size:0.9rem;
                color:#64748b;
                text-decoration:none;
                transition:0.2s;
                 " onmouseover="this.style.color='#6366f1'; this.style.transform='translateX(-2px)'"
                    onmouseout="this.style.color='#64748b'; this.style.transform='translateX(0)'">
                    ← Back to login
                </a>

            </form>

        </div>

    </div>
</div>

{% endblock content %}
